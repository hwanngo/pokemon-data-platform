name: pokedata

# Shared Airflow environment (values come from the repo-root .env file).
x-airflow-env: &airflow-env
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pokemon_data}
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  # Airflow 3: FAB auth manager provides user management / the `users create` CLI.
  AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
  # Airflow 3: LocalExecutor task workers reach the Execution API on the api-server
  # container (the unset default points at localhost, which is empty here).
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: http://airflow-webserver:8080/execution/
  # Secrets come from .env (generated by `make _env`); no in-repo defaults.
  AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY:?AIRFLOW_FERNET_KEY must be set run `make start`}
  # Shared JWT secret — the scheduler signs Execution API tokens that the
  # api-server must validate, so BOTH need the same value.
  AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_JWT_SECRET:?AIRFLOW_JWT_SECRET must be set run `make start`}

services:
  postgres:
    container_name: pokedata-postgres-dev
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-pokemon_data}
    volumes:
      # postgres:18+ stores data in a versioned subdir, so the volume mounts at
      # /var/lib/postgresql (not /var/lib/postgresql/data).
      - postgres_data:/var/lib/postgresql
      - ../database/initdb/init.sh:/docker-entrypoint-initdb.d/init.sh
      - ../database/initdb/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      - ../database/migrations:/docker-entrypoint-initdb.d/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    mem_limit: 1g

  app:
    container_name: pokedata-app-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.app
    image: pokedata-app:dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pokemon_data}
      API_BASE_URL: ${API_BASE_URL:-https://pokeapi.co/api/v2}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-20}
      API_CONCURRENCY: ${API_CONCURRENCY:-8}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
    volumes:
      # The whole repo is mounted, so the client's cache/ dir lives at <repo>/cache.
      - ../:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    ports:
      # Override the host port to avoid conflicts, e.g. `APP_PORT=8001 make start`.
      - "${APP_PORT:-8000}:8000"

  airflow-scheduler:
    container_name: pokedata-airflow-scheduler-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: pokedata-airflow:dev
    environment:
      <<: *airflow-env
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow:/opt/airflow/src:/opt/airflow/dags
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-pokemon_data}
      API_BASE_URL: ${API_BASE_URL:-https://pokeapi.co/api/v2}
      API_RATE_LIMIT: ${API_RATE_LIMIT:-20}
      API_CONCURRENCY: ${API_CONCURRENCY:-8}
    volumes:
      - ../src:/opt/airflow/src
      - ../src/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
      # Project-local raw-JSON cache (bind mount): fetched API responses persist
      # in <repo>/cache so re-runs re-ingest from disk without re-calling PokéAPI.
      - ../cache:/opt/airflow/cache
    command: airflow scheduler
    depends_on:
      postgres:
        condition: service_healthy
    # LocalExecutor runs task processes here; pandas/numpy ETL tasks need headroom.
    mem_limit: 2g

  # Airflow 3: DAG parsing is a separate component — without it, no DAGs appear.
  airflow-dag-processor:
    container_name: pokedata-airflow-dag-processor-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: pokedata-airflow:dev
    environment:
      <<: *airflow-env
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow:/opt/airflow/src:/opt/airflow/dags
    volumes:
      - ../src:/opt/airflow/src
      - ../src/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    command: airflow dag-processor
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    mem_limit: 512m

  airflow-webserver:
    container_name: pokedata-airflow-webserver-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: pokedata-airflow:dev
    environment:
      <<: *airflow-env
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      PYTHONPATH: /opt/airflow:/opt/airflow/src:/opt/airflow/dags
      # JWT secret comes from the shared anchor. API session secret (webserver-only):
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_JWT_SECRET:?AIRFLOW_JWT_SECRET must be set run `make start`}
    volumes:
      - ../src:/opt/airflow/src
      - ../src/dags:/opt/airflow/dags
      - airflow_logs:/opt/airflow/logs
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    # Airflow 3: `airflow webserver` is replaced by `airflow api-server`.
    command: airflow api-server
    depends_on:
      postgres:
        condition: service_healthy
      airflow-scheduler:
        condition: service_started
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  airflow-init:
    container_name: pokedata-airflow-init-dev
    build:
      context: ..
      dockerfile: docker/Dockerfile.airflow
    image: pokedata-airflow:dev
    environment:
      <<: *airflow-env
    depends_on:
      postgres:
        condition: service_healthy
    # Airflow 3: `airflow db init` is replaced by `airflow db migrate`.
    # The admin user comes from .env; `|| true` keeps re-runs idempotent.
    command: >
      bash -c "airflow db migrate &&
      (airflow users create -r Admin
      -u ${AIRFLOW_ADMIN_USERNAME:-admin}
      -p ${AIRFLOW_ADMIN_PASSWORD:-admin}
      -e ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
      -f ${AIRFLOW_ADMIN_FIRSTNAME:-Admin}
      -l ${AIRFLOW_ADMIN_LASTNAME:-User} || true) &&
      airflow pools set pokeapi_mirror ${MIRROR_POOL_SLOTS:-2} 'Throttle concurrent PokeAPI mirror tasks'"

volumes:
  postgres_data:
  airflow_logs:
